[package]
name = "nih-plug-playground"
version = "0.1.0"
edition = "2021"

[dependencies]
eframe = { version = "0.33", features = ["default"] }
egui_code_editor = "0.2.21"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rfd = "0.15"
dirs = "5"
cpal = "0.15"
midir = "0.10"
crossbeam-channel = "0.5"

clack-host = { git = "https://github.com/prokopyl/clack.git", package = "clack-host" }
clack-extensions = { git = "https://github.com/prokopyl/clack.git", package = "clack-extensions", features = ["audio-ports", "note-ports"] }
